name: Build APK

# ── 触发条件 ────────────────────────────────────────────────────────────────────
# • push tag v*.*.* → 构建签名 APK 并发布 GitHub Release
# • PR to master    → 只做 lint 检查，不出 APK，快速反馈
on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # 同一 ref 有新触发时取消旧的运行

permissions:
  contents: write   # release job 需要写权限创建 GitHub Release

# ════════════════════════════════════════════════════════════════════════════════
# Job 1: PR 检查（仅 PR 触发，快速反馈，不出 APK）
# ════════════════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: Lint (PR only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Lint
        run: |
          cd ${{ github.workspace }}/V2rayNG
          chmod +x gradlew
          ./gradlew lint --continue

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-${{ github.sha }}
          path: '**/build/reports/lint-results*.html'
          retention-days: 7

# ════════════════════════════════════════════════════════════════════════════════
# Job 2: Release（仅 Tag push，构建签名 APK 并发布 GitHub Release）
# ════════════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "28.2.13676358"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        bash compile-hevtun.sh
    
    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Fetch AndroidLibXrayLite tag
      run: |
        pushd AndroidLibXrayLite
        CURRENT_TAG=$(git describe --tags --abbrev=0)
        echo "Current tag in this repo: $CURRENT_TAG"
        echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
        popd

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.12
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ── 从 Tag 解析版本号 ──────────────────────────────────────────────────────
    - name: Extract version from tag
      id: version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        echo "tag=$TAG"         >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

    - name: Build APK
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew licenseFdroidReleaseReport
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
          -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
          -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
    
    - name: Cleanup keystore
      if: always()
      run: rm -f $GITHUB_WORKSPACE/release.jks

    # ── 整理产物 ───────────────────────────────────────────────────────────────
    - name: Collect APK artifacts
      run: |
        mkdir -p artifacts
        find ${{ github.workspace }}/V2rayNG/app/build/outputs/apk -name "*.apk" | while read f; do
          cp "$f" "artifacts/$(basename "$f" .apk)-${{ steps.version.outputs.tag }}.apk"
        done
        ls -lh artifacts/

    # ── 生成 Changelog ────────────────────────────────────────────────────────
    - name: Generate Changelog
      id: changelog
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
        else
          LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$LOG"           >> $GITHUB_OUTPUT
        echo "EOF"            >> $GITHUB_OUTPUT

    # ── 发布 GitHub Release ────────────────────────────────────────────────────
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Release ${{ steps.version.outputs.tag }}
        body: |
          ## 📦 v2rayNG ${{ steps.version.outputs.tag }}

          **Version:** `${{ steps.version.outputs.version }}`
          **Commit:** `${{ github.sha }}`

          ### 📋 What's Changed

          ${{ steps.changelog.outputs.changelog }}
        files: artifacts/*.apk
        draft: false
        prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
